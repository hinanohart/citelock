name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      # Core + dev only: tests run on the stub and recorded fixtures, so CI needs
      # no torch and no model download.
      - run: uv pip install --system -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests eval
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest -q

  honest-marketing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required disclaimer is present
        run: grep -q "not a fact-checker" README.md
      - name: Banned marketing phrases are absent
        run: |
          if grep -rniE 'fully automatic|fully autonomous|never fails|100% accurate|100% reliable|permanent solution|completely automatic|forever' README.md; then
            echo "::error::banned marketing phrase found in README"; exit 1
          fi
      - name: No placeholder metric tokens
        run: |
          if grep -rniE 'TODO_NUMBER|FIXME_METRIC|XXX_PLACEHOLDER' README.md eval/; then
            echo "::error::placeholder metric token found"; exit 1
          fi
